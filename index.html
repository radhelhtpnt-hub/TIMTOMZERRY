<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhay Online Store</title>
    <style>
        body { background-color: #f8f9fa; font-family: sans-serif; margin: 0; padding: 0; text-align: center; color: #333; }
        header { background: #2c3e50; color: white; padding: 30px 20px; }
        .container { padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .product-card { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 300px; overflow: hidden; }
        .product-card img { width: 100%; height: 300px; object-fit: cover; }
        .details { padding: 20px; }
        .price { color: #27ae60; font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .btn-whatsapp { background: #25d366; color: white; padding: 12px; text-decoration: none; border-radius: 8px; display: block; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Abhay Online Store</h1>
    <p>प्रीमियम क्वालिटी टी-शर्ट्स | रोहिणा, गुजरात</p>
</header>

<div class="container">
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500" alt="Black T-Shirt">
        <div class="details">
            <h3>Classic Black T-Shirt</h3>
            <p class="price">₹349</p>
            <a href="https://wa.me/918999087311?text=नमस्ते अभय, मुझे ब्लैक शर्ट चाहिए" class="btn-whatsapp">WhatsApp पर ऑर्डर दें</a>
        </div>
    </div>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1581655353564-df123a1eb820?w=500" alt="White T-Shirt">
        <div class="details">
            <h3>Premium White T-Shirt</h3>
            <p class="price">₹349</p>
            <a href="https://wa.me/918999087311?text=नमस्ते अभय, मुझे व्हाइट शर्ट चाहिए" class="btn-whatsapp">WhatsApp पर ऑर्डर दें</a>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 Abhay Store - रोहिणा, वलसाड</p>
</footer>

</body>
</html>
