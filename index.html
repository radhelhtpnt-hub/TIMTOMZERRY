<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhay Online Store</title>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; text-align: center; color: #333; }
        header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; padding: 40px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        h1 { margin: 0; font-size: 28px; }
        
        .container { padding: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        
        .product-card { background: white; border-radius: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); width: 300px; overflow: hidden; transition: 0.3s; }
        .product-card img { width: 100%; height: 300px; object-fit: cover; }
        
        .details { padding: 15px; }
        .price { color: #e74c3c; font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        
        .btn { background: #25d366; color: white; padding: 12px 20px; text-decoration: none; border-radius: 50px; display: block; font-weight: bold; margin-bottom: 10px; }
        
        /* शेयर बटन का स्टाइल */
        .share-btn { background: #3498db; color: white; padding: 12px 20px; text-decoration: none; border-radius: 50px; display: block; font-weight: bold; }
        
        .footer { color: #888; font-size: 14px; margin-top: 30px; padding-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>Abhay Online Store</h1>
        <p>क्वालिटी प्रिंटिंग, सीधा आपके द्वार</p>
    </header>

    <div class="container">
        <div class="product-card">
            <img src="Screenshot 2026-04-11 9.18.42 AM.png" alt="T-Shirt">
            <div class="details">
                <h3>Custom Printed T-Shirt</h3>
                <div class="price">₹499</div>
                <a href="https://wa.me/918999087311?text=नमस्ते अभय, मुझे यह टी-शर्ट पसंद है।" class="btn">WhatsApp पर ऑर्डर करें</a>
                
                <a href="whatsapp://send?text=नमस्ते! अभय की ऑनलाइन प्रिंटिंग शॉप देखें। यहाँ बेहतरीन टी-शर्ट मिलते हैं: https://radhelhtpnt-hub.github.io/TIMTOMZERRY/" class="share-btn">दोस्तों को शेयर करें ↗️</a>
            </div>
        </div>

        <div class="product-card">
            <img src="Screenshot 2026-04-11 9.19.08 AM.png" alt="Printing">
            <div class="details">
                <h3>Premium Printed Item</h3>
                <div class="price">₹299</div>
                <a href="https://wa.me/918999087311?text=नमस्ते अभय, मुझे इसके बारे में जानना है।" class="btn">WhatsApp पर ऑर्डर करें</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>📍 गुजरात | अभय ऑनलाइन स्टोर</p>
    </div>

</body>
</html>
